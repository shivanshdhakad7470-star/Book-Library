<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Read Book</title>

<link rel="stylesheet" href="style.css">

<style>

.reader-container{
 padding:40px;
}

.reader-header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:20px;
}

.reader-actions button{
 margin-left:10px;
 padding:8px 12px;
 border:none;
 background:#111;
 color:white;
 border-radius:5px;
}

.pdf-viewer{
 height:600px;
 border:1px solid #ddd;
 display:flex;
 justify-content:center;
 align-items:center;
 background:#f5f5f5;
}

</style>

</head>

<body>

<div class="reader-container">

<div class="reader-header">

<h2>JavaScript Basics</h2>

<div class="reader-actions">

<button>⭐ Rate</button>
<button>❤️ Favorite</button>
<button>🔖 Bookmark</button>

</div>

</div>

<div class="pdf-viewer">

<p>PDF Viewer will appear here</p>

</div>

</div>

</body>

</html>
